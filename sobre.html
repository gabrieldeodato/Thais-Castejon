<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecionando... - Dra. Thais Castejon</title>
  <script>
    (function() {
      var isFile = window.location.protocol === 'file:';
      var suffix = '#sobre';
      if (isFile) {
        window.location.replace('index.html' + suffix);
      } else {
        window.location.replace('/' + suffix);
      }
    })();
  </script>
</head>
<body style="background-color: #faf8ff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #00236f;">
  <div style="text-align: center;">
    <h2>Redirecionando...</h2>
    <p>Se você não for redirecionado automaticamente, <a href="index.html#sobre" id="fallback-link" style="color: #c5a880; font-weight: bold; text-decoration: none; border-bottom: 1px solid #c5a880;">clique aqui</a>.</p>
  </div>
  <script>
    var suffix = '#sobre';
    var fallback = document.getElementById('fallback-link');
    if (window.location.protocol === 'file:') {
      fallback.href = 'index.html' + suffix;
    } else {
      fallback.href = '/' + suffix;
    }
  </script>
</body>
</html>
