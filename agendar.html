<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Agendar Consulta - Dra. Thais Castejon</title>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const treatment = urlParams.get('treatment') || '';
      let target = 'index.html?booking=open';
      if (window.location.protocol !== 'file:') {
        target = '/?booking=open';
      }
      const redirectUrl = target + (treatment ? '&treatment=' + treatment : '');
      document.getElementById('fallback-link').setAttribute('href', redirectUrl);
      window.location.replace(redirectUrl);
    });
  </script>
</head>
<body>
  <div style="font-family: sans-serif; text-align: center; padding: 50px;">
    <h2>Redirecionando para a agenda...</h2>
    <p>Caso não seja redirecionado automaticamente, <a id="fallback-link" href="index.html?booking=open">clique aqui</a>.</p>
  </div>
</body>
</html>
